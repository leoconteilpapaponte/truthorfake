<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truth or Fake</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 15px;
}

#header {
    text-align: center;
}

#logo {
    width: 150px;
    display: block;
    margin: auto;
    border-radius: 50%;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 18px;
}

.true { background: green; color: white; }
.false { background: red; color: white; }

#progress {
    height: 10px;
    background: #ddd;
    margin-bottom: 10px;
}

#bar {
    height: 10px;
    width: 0%;
    background: green;
}

#timer, #score {
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div id="header">
<img src="logo.png">
<h1>Truth or Fake</h1>
</div>

<div id="intro" class="card">
<h2>How to spot fake news</h2>
<ul>
<li>Check the source</li>
<li>Look for evidence</li>
<li>Avoid emotional headlines</li>
<li>Compare sources</li>
</ul>
<button onclick="start()">Start</button>
</div>

<div id="quiz" class="card" style="display:none;">
<div id="progress"><div id="bar"></div></div>

<div id="timer">Time: 10</div>
<h2 id="q"></h2>

<button class="true" onclick="answer(true)">True</button>
<button class="false" onclick="answer(false)">False</button>

<div id="result"></div>
<div id="score">Score: 0</div>
</div>

<div id="end" class="card" style="display:none;"></div>

</div>

<script>
let questions = [
["Drinking water increases intelligence by 30%", false, "Fake: no evidence"],
["NASA hit an asteroid", true, "True: DART mission"],
["Man lived on pizza 3 months", false, "Fake: unrealistic"],
["EU USB-C law approved", true, "True"],
["Sharks walk on land", false, "Fake"],
["AI passed law exam", true, "True"],
["Chocolate doubles lifespan", false, "Fake"],
["Robot hotel in Japan exists", true, "True"],
["Aliens contacted Earth", false, "Fake"],
["Climate change increases extreme weather", true, "True"]
];

let i = 0;
let score = 0;
let time = 10;
let timer;

function start() {
document.getElementById("intro").style.display = "none";
document.getElementById("quiz").style.display = "block";
next();
}

function next() {
if(i >= questions.length){
end();
return;
}

document.getElementById("q").innerText = questions[i][0];
document.getElementById("result").innerText = "";
time = 10;
document.getElementById("timer").innerText = "Time: " + time;

clearInterval(timer);
timer = setInterval(()=>{
time--;
document.getElementById("timer").innerText = "Time: " + time;

if(time == 0){
clearInterval(timer);
wrong();
}
},1000);

updateBar();
}

function answer(a){
clearInterval(timer);

if(a == questions[i][1]){
score += 3;
document.getElementById("result").innerText = "Correct!";
}else{
wrong();
return;
}

document.getElementById("score").innerText = "Score: " + score;
i++;
setTimeout(next,1000);
}

function wrong(){
document.getElementById("result").innerText = "Wrong! " + questions[i][2];
i++;
setTimeout(next,1500);
}

function updateBar(){
let p = (i / questions.length) * 100;
document.getElementById("bar").style.width = p + "%";
}

function end(){
document.getElementById("quiz").style.display = "none";
document.getElementById("end").style.display = "block";

let msg = "";

if(score >= 27) msg = "Excellent!";
else if(score >= 18) msg = "Good job!";
else msg = "Be careful with fake news!";

document.getElementById("end").innerHTML =
"<h2>Finished</h2><p>Score: "+score+"/30</p><p>"+msg+"</p>";
}
</script>

</body>
</html>
